version: '3.8'

services:
  qoder-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qoder-cli-v0.1.37
    image: qoder-cli:0.1.37
    stdin_open: true
    tty: true
    volumes:
      # Persist Qoder data and configurations
      - qoder-data:/home/qoder/.qoder
      - qoder-cli-data:/home/qoder/.qoder-cli
      # Mount your projects (adjust path as needed)
      - ./projects:/home/qoder/projects
      # Optional: Mount SSH keys for Git operations
      - ~/.ssh:/home/qoder/.ssh:ro
      # Optional: Mount Git config
      - ~/.gitconfig:/home/qoder/.gitconfig:ro
    environment:
      # Disable all update checks
      - QODER_AUTO_UPDATES=false
      - QODER_DISABLE_UPDATE_CHECK=true
      - npm_config_update_notifier=false
      - NODE_ENV=production
    working_dir: /home/qoder/projects
    # Uncomment below if you need network access to MCP servers
    # network_mode: host
    restart: unless-stopped

volumes:
  qoder-data:
    name: qoder-config-data
  qoder-cli-data:
    name: qoder-cli-data
