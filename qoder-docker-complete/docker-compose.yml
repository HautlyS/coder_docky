version: '3.8'

services:
  dev-environment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psiu-dev-complete
    image: psiu-dev:complete
    stdin_open: true
    tty: true
    volumes:
      # Persist all configuration
      - dev-data:/root/.qoder
      - dev-cli-data:/root/.qoder-cli
      - dev-nvm:/root/.nvm
      - dev-local-bin:/root/.local/bin
      # Mount your projects
      - ./workspace:/home/workspace
      # Optional: Mount SSH keys for Git operations
      - ~/.ssh:/root/.ssh:ro
      # Optional: Mount Git config
      - ~/.gitconfig:/root/.gitconfig:ro
      # Chrome support
      - chrome-data:/root/.config/google-chrome
    environment:
      # Disable all update checks
      - QODER_AUTO_UPDATES=false
      - QODER_DISABLE_UPDATE_CHECK=true
      - npm_config_update_notifier=false
      - NODE_ENV=production
      # GitHub Token (optional, can be set at runtime)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    working_dir: /home/workspace
    # Grant necessary permissions for Chrome
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped

volumes:
  dev-data:
    name: psiu-dev-data
  dev-cli-data:
    name: psiu-cli-data
  dev-nvm:
    name: psiu-nvm-data
  dev-local-bin:
    name: psiu-local-bin
  chrome-data:
    name: chrome-profile-data
